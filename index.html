<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PACKT — Hikayemiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #ededee;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ══════════════════════════════════════
       SECTION LAYOUT
    ══════════════════════════════════════ */
    .p-story {
      display: flex;
      align-items: stretch;
      height: 100vh;
      background: #ededee;
    }

    /* ── Image Panel ── */
    .p-story__visual {
      flex: 0 0 58%;
      position: relative;
      overflow: hidden;
    }

    .p-story__visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 40%;
      display: block;
    }

    /* Right-edge fade: image dissolves into background */
    .p-story__visual::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        transparent 55%,
        rgba(237, 237, 238, 0.45) 75%,
        rgba(237, 237, 238, 0.88) 92%,
        #ededee 100%
      );
      pointer-events: none;
    }

    /* ── Text Panel ── */
    .p-story__content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 4.5rem 4rem 1.5rem;
    }

    /* Accent rule */
    .p-story__accent {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }

    .p-story__accent-line {
      width: 28px;
      height: 1px;
      background: #f54f36;
      flex-shrink: 0;
    }

    .p-story__label {
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #f54f36;
      font-weight: 500;
    }

    /* Body text */
    .p-story__text {
      font-size: 1rem;
      line-height: 1.85;
      color: #3A3838;
      font-weight: 300;
      max-width: 310px;
    }

    /* CTA link */
    .p-story__cta {
      margin-top: 2.75rem;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
      color: #3A3838;
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      transition: color 0.25s;
    }

    .p-story__cta-label {
      border-bottom: 1px solid #3A3838;
      padding-bottom: 2px;
      transition: border-color 0.25s;
    }

    .p-story__cta-arrow {
      font-size: 1rem;
      line-height: 1;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.25s;
    }

    .p-story__cta:hover {
      color: #f54f36;
    }

    .p-story__cta:hover .p-story__cta-label {
      border-color: #f54f36;
    }

    .p-story__cta:hover .p-story__cta-arrow {
      transform: translateX(6px);
    }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 860px) {
      html, body { overflow: auto; }

      .p-story {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }

      .p-story__visual {
        flex: 0 0 auto;
        height: 60vw;
        min-height: 240px;
      }

      /* Mobile: bottom fade instead of right fade */
      .p-story__visual::after {
        background: linear-gradient(
          to bottom,
          transparent 55%,
          rgba(237, 237, 238, 0.6) 80%,
          #ededee 100%
        );
      }

      .p-story__content {
        padding: 2.5rem 2rem 3rem;
      }

      .p-story__text {
        max-width: 100%;
      }
    }

    @media (max-width: 480px) {
      .p-story__content {
        padding: 2rem 1.5rem 2.5rem;
      }

      .p-story__text {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

  <section class="p-story">

    <div class="p-story__visual">
      <img
        src="./IMG_6131.jpg"
        alt="Packt modüler çalışma ekosistemi — ahşap ve metal organizerlar"
      >
    </div>

    <div class="p-story__content">
      <div class="p-story__accent">
        <div class="p-story__accent-line"></div>
        <span class="p-story__label">Hikayemiz</span>
      </div>

      <p class="p-story__text">
        Ahşap ve metalin yalın uyumundan doğan Packt; estetiği ve ergonomiyi bir araya getiren modüler çözümler sunar. Karmaşadan uzak, sadece size ait ve sizinle şekillenen bir çalışma ekosistemi.
      </p>

      <a class="p-story__cta" href="../packt-storypage/index.html">
        <span class="p-story__cta-label">Hikayemizi Keşfedin</span>
        <span class="p-story__cta-arrow">→</span>
      </a>
    </div>

  </section>

</body>
</html>
