<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PACKT — Hikayemiz (Anasayfa Bölümü)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       ALL STYLES SCOPED UNDER .p-storysec — ikas CSS isolation
       ============================================================ */

    .p-storysec *, .p-storysec *::before, .p-storysec *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    .p-storysec {
      --platinum:   #ededee;
      --graphite:   #333132;
      --terracotta: #f54f36;
      --bone:       #d3d2c1;
      --grey:       #777a7d;

      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      color: var(--graphite);
      background: var(--platinum);
      overflow: hidden;
      width: 100%;
      position: relative;
      -webkit-font-smoothing: antialiased;

      display: flex;
      align-items: stretch;
      min-height: 78vh;
    }

    /* ── Image Panel ── */
    .p-storysec__visual {
      flex: 0 0 58%;
      position: relative;
      overflow: hidden;
    }

    .p-storysec__visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 40%;
      display: block;
    }

    /* Right-edge fade: image dissolves into background */
    .p-storysec__visual::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        transparent 55%,
        rgba(237, 237, 238, 0.45) 75%,
        rgba(237, 237, 238, 0.88) 92%,
        var(--platinum) 100%
      );
      pointer-events: none;
    }

    /* ── Text Panel ── */
    .p-storysec__content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 88px 64px 88px 24px;
    }

    /* Eyebrow */
    .p-storysec__eyebrow {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--grey);
    }

    .p-storysec__eyebrow::before {
      content: '';
      width: 28px;
      height: 1px;
      background: var(--terracotta);
      flex-shrink: 0;
    }

    /* Title */
    .p-storysec__title {
      margin-top: 24px;
      font-size: clamp(28px, 3.4vw, 46px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: var(--graphite);
      max-width: 420px;
    }

    .p-storysec__title em {
      font-style: normal;
      color: var(--terracotta);
    }

    /* Body text */
    .p-storysec__text {
      margin-top: 24px;
      font-size: 15px;
      line-height: 1.85;
      color: var(--grey);
      font-weight: 400;
      max-width: 400px;
    }

    /* CTA button — matches landing p-btn--outline */
    .p-storysec__cta {
      margin-top: 44px;
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 13px 28px;
      border: 1px solid var(--graphite);
      color: var(--graphite);
      background: transparent;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
    }

    .p-storysec__cta-arrow {
      font-size: 14px;
      line-height: 1;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .p-storysec__cta:hover {
      background: var(--graphite);
      color: var(--platinum);
    }

    .p-storysec__cta:hover .p-storysec__cta-arrow {
      transform: translateX(5px);
    }

    /* ===== SCROLL REVEAL ===== */
    .p-storysec .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.8s ease, transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .p-storysec .reveal--delay-1 { transition-delay: 0.1s; }
    .p-storysec .reveal--delay-2 { transition-delay: 0.2s; }
    .p-storysec .reveal--delay-3 { transition-delay: 0.3s; }

    .p-storysec .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .p-storysec .reveal { opacity: 1; transform: none; transition: none; }
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 860px) {
      .p-storysec {
        flex-direction: column;
        min-height: 0;
      }

      .p-storysec__visual {
        flex: 0 0 auto;
        height: 62vw;
        min-height: 240px;
      }

      /* Mobile: bottom fade instead of right fade */
      .p-storysec__visual::after {
        background: linear-gradient(
          to bottom,
          transparent 55%,
          rgba(237, 237, 238, 0.6) 80%,
          var(--platinum) 100%
        );
      }

      .p-storysec__content {
        padding: 8px 24px 64px;
      }

      .p-storysec__title,
      .p-storysec__text {
        max-width: 100%;
      }
    }
  </style>
</head>
<body style="margin:0; background:#ededee;">

  <!-- ikas'a taşırken: bu <section> bloğunu (style + script ile birlikte)
       özel HTML alanına yapıştırın. Görseli ikas medya kütüphanesine yükleyip
       src'yi CDN adresiyle değiştirin. CTA linki: /pages/hikayemiz -->
  <section class="p-storysec">

    <div class="p-storysec__visual">
      <img
        src="./IMG_6131.jpg"
        alt="Packt modüler çalışma ekosistemi — ahşap ve metal organizerlar"
        loading="lazy"
      >
    </div>

    <div class="p-storysec__content">
      <div class="p-storysec__eyebrow reveal">Hikayemiz</div>

      <h2 class="p-storysec__title reveal reveal--delay-1">
        Ahşap ve metalin<br>yalın <em>uyumu.</em>
      </h2>

      <p class="p-storysec__text reveal reveal--delay-2">
        Ahşap ve metalin yalın uyumundan doğan Packt; estetiği ve ergonomiyi bir araya getiren modüler çözümler sunar. Karmaşadan uzak, sadece size ait ve sizinle şekillenen bir çalışma ekosistemi.
      </p>

      <a class="p-storysec__cta reveal reveal--delay-3" href="/pages/hikayemiz">
        <span>Hikayemizi Keşfedin</span>
        <span class="p-storysec__cta-arrow">→</span>
      </a>
    </div>

  </section>

  <script>
    (function () {
      'use strict';

      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            io.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

      document.querySelectorAll('.p-storysec .reveal').forEach(function (el) {
        io.observe(el);
      });
    })();
  </script>

</body>
</html>
